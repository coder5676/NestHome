<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Player</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>

<body>

<video id="player" controls autoplay></video>



</body>
</html>
<script>

const video = document.getElementById("player");

let currentMovieKey = "";
let currentFile = "";

// receive video from Electron
window.electronAPI.onVideo((movieData) => {

  currentFile = movieData.file;
  currentMovieKey = movieData.name || movieData.file.split(".")[0];

  const last = movieData.last_watched || 0;

  video.src = `../videos/${currentFile}`;
  video.load();

  video.addEventListener("loadedmetadata", () => {

    const isFinished = last >= (video.duration - 1);

    video.currentTime = isFinished ? 0 : last;

    video.play().catch(console.log);

  }, { once: true });

});


// ✅ SINGLE GLOBAL INTERVAL (FIXED)
setInterval(() => {

  if (!currentMovieKey) return;
  if (video.readyState < 2) return;

  window.electronAPI.saveProgress({
    name: currentMovieKey,
    time: video.currentTime
  });

}, 5000);


// ✅ OPTIONAL: proper end handling
video.addEventListener("ended", () => {

  window.electronAPI.saveProgress({
    name: currentMovieKey,
    time: video.duration
  });

});

</script>
