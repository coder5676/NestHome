<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestHome</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/954e575aaa.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <p class="d1" id="day">
            Sunday .• 1 March 2004 .• Guru purnima
        </p>
    <div class="d2">
<h1 id="time">12:30</h1>
<div class="ampm">
    <h2 id="am">AM</h2>
    <h2 id="pm">PM</h2>
</div>
    </div>
    <h1 class="city" id="location">Raebareli, Uttar pradesh </h1>
    <div class="d3">
<div class="card1">
    <h1>Temperature</h1>
    <p id="desc"></p>
    <h2 id="temp"></h2>
    <p id="feels"></p>
    <p style="margin-bottom: 20px;" id="hilo">
</p>
</div>
<div class="weathericon">
    <h1 style="align-self: flex-start;">Weather</h1>
    <h2 id="ic"></h2>
    <p id="desc2"></p>
</div>
<div style="width:50%" class="entertainment" >
    <h1>Entertainment</h1>
    <div class="card12">
        <div id="pla">
            <h5 id="title"></h5>
            <audio controls id="musicplayer">
            </audio>
        </div>
        <div style="background-size:cover;background-position:center;background-repeat:no-repeat;" id="thumbnail"></div>
    </div>
</div>
    </div>

    <div class="popup">
        <div class="animation" id="animation">
<div class="sd" id="sd"></div>
<div class="sg" id="sg"></div>
<div class="sd" id="sd"></div>
        </div>
        <p id="prompt">open youtube</p>
    </div>

    <div class="weatherdetails">

    </div>
    </div>
    
</body>
</html>
<script src="script.js"></script>
